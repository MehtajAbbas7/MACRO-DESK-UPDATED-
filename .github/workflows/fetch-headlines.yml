name: Fetch macro headlines

on:
  schedule:
    # Runs every 3 hours, free on GitHub Actions for public repos
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch headlines from NewsAPI
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          mkdir -p data
          curl -s "https://newsapi.org/v2/everything?q=(Fed%20OR%20DXY%20OR%20gold%20OR%20FTSE%20OR%20inflation%20OR%20CPI%20OR%20Federal%20Reserve)&language=en&sortBy=publishedAt&pageSize=20&apiKey=$NEWSAPI_KEY" > data/headlines.json

      - name: Fetch economic calendar from TradingEconomics (free guest tier)
        run: |
          curl -s "https://api.tradingeconomics.com/calendar/country/united%20states,united%20kingdom,euro%20area?c=guest:guest&f=json" > data/calendar.json || echo "[]" > data/calendar.json

      - name: Commit updated data
        run: |
          git config user.name "macro-desk-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/headlines.json data/calendar.json
          git diff --staged --quiet || git commit -m "Auto-update headlines $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
