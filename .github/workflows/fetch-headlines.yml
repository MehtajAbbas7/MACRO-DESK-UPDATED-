name: Fetch macro headlines

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch headlines
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: mkdir -p data && curl -s "https://newsapi.org/v2/everything?q=Federal+Reserve+OR+inflation+OR+dollar+index+OR+gold+OR+FTSE+OR+central+bank+OR+Trump+OR+Iran+OR+ceasefire+OR+Hormuz+OR+Powell+OR+Warsh+OR+ECB+OR+Lagarde+OR+Bank+of+England+OR+Bailey+OR+White+House+OR+rate+decision&domains=reuters.com,bloomberg.com,cnbc.com,ft.com,wsj.com&language=en&sortBy=publishedAt&pageSize=40&apiKey=$NEWSAPI_KEY" -o data/headlines.json

      - name: Fetch calendar
        run: curl -s "https://api.tradingeconomics.com/calendar/country/united%20states,united%20kingdom,euro%20area?c=guest:guest&f=json" -o data/calendar.json

      - name: Generate analysis with Gemini
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          python3 -c "
          import json, urllib.request, os

          with open('data/headlines.json') as f:
              headlines_data = json.load(f)
          articles = headlines_data.get('articles', [])[:15]
          titles = [a.get('title','') for a in articles]
          headline_text = chr(10).join(titles)

          prompt = '''You are a macro analyst. Based on these recent financial headlines, write a JSON object with this exact structure, no markdown, no extra text:
          {
            \"usd_bias\": \"Bullish\" or \"Bearish\" or \"Neutral\",
            \"usd_reason\": \"one sentence why\",
            \"gold_bias\": \"Bullish\" or \"Bearish\" or \"Neutral\",
            \"gold_reason\": \"one sentence why\",
            \"indices_bias\": \"Bullish\" or \"Bearish\" or \"Neutral\",
            \"indices_reason\": \"one sentence why\",
            \"lead_story\": \"2-3 sentence summary of the single biggest driver right now\",
            \"updated\": \"current UTC timestamp\"
          }

          Headlines:
          ''' + headline_text

          key = os.environ['GEMINI_KEY']
          url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={key}'
          body = json.dumps({'contents':[{'parts':[{'text':prompt}]}]}).encode()
          req = urllib.request.Request(url, data=body, headers={'Content-Type':'application/json'})
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  result = json.loads(resp.read())
                  text = result['candidates'][0]['content']['parts'][0]['text']
                  text = text.strip().removeprefix('\`\`\`json').removesuffix('\`\`\`').strip()
                  analysis = json.loads(text)
          except Exception as e:
              analysis = {'error': str(e)}

          with open('data/analysis.json', 'w') as f:
              json.dump(analysis, f, indent=2)
          "

      - name: Commit data
        run: |
          git config user.name "macro-desk-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/headlines.json data/calendar.json data/analysis.json
          git diff --staged --quiet || git commit -m "Auto-update headlines and analysis"
          git push
